name: Daily Momentum Run

on:
  schedule:
    # Mo-Fr 17:00 UTC = 18:00 CEST
    - cron: '0 17 * * 1-5'
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          IG_API_KEY: ${{ secrets.IG_API_KEY }}
          IG_USERNAME: ${{ secrets.IG_USERNAME }}
          IG_PASSWORD: ${{ secrets.IG_PASSWORD }}
          IG_ACC_NUMBER: ${{ secrets.IG_ACC_NUMBER }}
        run: python main.py

      - name: Publish Dashboard Report to GitHub Pages
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ reports/ logs/
          git diff --staged --quiet || git commit -m "chore: update dashboard $(date +'%Y-%m-%d')"
          git push

      - name: Upload daily report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: reports/
          retention-days: 30

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: daily-logs-${{ github.run_id }}
          path: logs/
          retention-days: 14
